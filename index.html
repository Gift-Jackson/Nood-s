<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nood's | Splash Screen</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/transition.css">
    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- MATERIAL ICON -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <!-- AOS LINK -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>

    <div id="app">
        <div class="transition active">
            <div class="transition-content">
                <div class="spinner"></div>
                <h3>Cooking 🍜...</h3>
            </div>
        </div>
        <div class="splashScreen">
            <div class="splashContent">
                <div>
                    <img src="assets/logo.png" alt="Noods Logo">
                    <h3>Satisfy Your Cravings!</h3>
                </div>

                <button onclick="closeSplashScreen(this)">
                    Order Now &nbsp; <i class="fa-solid fa-arrow-right fa-shake"></i>
                </button>
            </div>
        </div>
    </div>


     <!-- JAVASCRIPT -->
     <script src="js/main.js"></script>
     <script src="js/product.js"></script>
     <script src="js/routing.js"></script>
</body>

</html>
